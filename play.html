<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mission: Defend — Study Invaders</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/style.css">
<link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
<link rel="alternate icon" href="assets/favicon.ico">
<script src="https://js.puter.com/v2/"></script>
<style>
  #loadingView, #errorView, #gameView, #gameOverView{ display:none; }
  #errorView p{ font-size:18px; color:var(--ink-dim); margin-bottom:20px; text-align:center; }

  /* ---------- HUD ---------- */
  .gameHud{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom:10px;
    font-size:17px;
  }
  .hudScore{ color:var(--amber); }
  .livesRow{ display:flex; gap:6px; }
  .lifeIcon{ width:26px; height:auto; transition:opacity 0.3s, transform 0.3s; }
  .lifeIcon.lifeLost{ opacity:0; transform:scale(0.3) rotate(20deg); }

  .questionCounter{
    text-align:center;
    font-size:15px;
    color:var(--ink-dim);
    letter-spacing:1px;
    margin-bottom:6px;
  }
  .questionText{
    text-align:center;
    font-size:21px;
    line-height:1.4;
    color:var(--ink);
    min-height:58px;
    margin-bottom:18px;
    padding:0 4px;
  }

  /* ---------- Arena (UFOs + rocket + lasers) ---------- */
  .arena{
    position:relative;
    min-height:340px;
  }
  .ufoField{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:14px;
    padding:0 4px;
  }
  .ufoOption{
    background:var(--panel);
    border:2px solid var(--panel-edge);
    border-radius:10px;
    padding:10px 8px 12px;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:6px;
    cursor:pointer;
    font-family:'VT323', monospace;
    color:var(--ink);
    animation:ufoBob 3s ease-in-out infinite;
    transition:border-color 0.15s, transform 0.1s;
  }
  .ufoOption:hover{ border-color:var(--cyan); }
  .ufoOption:active{ transform:scale(0.97); }
  .ufoOption img{ width:52px; height:auto; }
  .ufoOption span{ font-size:16px; line-height:1.25; text-align:center; }
  .ufoOption:nth-child(1){ animation-delay:0s; }
  .ufoOption:nth-child(2){ animation-delay:0.4s; }
  .ufoOption:nth-child(3){ animation-delay:0.8s; }
  .ufoOption:nth-child(4){ animation-delay:1.2s; }
  @keyframes ufoBob{
    0%,100%{ transform:translateY(0); }
    50%{ transform:translateY(-7px); }
  }
  .ufoOption.correctFlash{
    border-color:var(--cyan);
    box-shadow:0 0 18px rgba(76,224,210,0.6);
    animation:none;
  }
  .ufoOption.wrongFlash{
    border-color:var(--red);
    box-shadow:0 0 18px rgba(255,84,112,0.6);
    animation:shake 0.4s;
  }
  @keyframes shake{
    0%,100%{ transform:translateX(0); }
    25%{ transform:translateX(-6px); }
    75%{ transform:translateX(6px); }
  }
  .ufoOption[disabled]{ cursor:default; pointer-events:none; }

  .rocketDock{
    display:flex;
    justify-content:center;
    margin-top:18px;
  }
  .rocketDock img{
    width:40px;
    height:auto;
    filter:drop-shadow(0 0 6px rgba(76,224,210,0.5));
  }

  #laserLayer{
    position:absolute;
    inset:0;
    pointer-events:none;
  }
  .laserBeam{
    position:absolute;
    height:3px;
    background:linear-gradient(90deg, var(--cyan), transparent);
    box-shadow:0 0 8px rgba(76,224,210,0.9);
    transform-origin:0 50%;
    border-radius:2px;
  }

  .feedbackBanner{
    text-align:center;
    font-size:17px;
    min-height:26px;
    margin-top:14px;
    padding:0 8px;
    color:var(--amber);
    opacity:0;
    transition:opacity 0.2s;
  }
  .feedbackBanner.show{ opacity:1; }
  .feedbackBanner.good{ color:var(--cyan); }
  .feedbackBanner.bad{ color:var(--red); }

  /* ---------- Game over ---------- */
  #gameOverView{ text-align:center; padding:20px 0; }
  #gameOverView h2{ margin-bottom:14px; }
  #gameOverView p{ font-size:19px; color:var(--ink-dim); margin-bottom:24px; }
</style>
</head>
<body>

<canvas id="starfield"></canvas>
<div id="crt"></div>

<div class="stage">
  <div class="cabinet wide">

    <div class="topBar">
      <span></span>
      <span class="agentTag">Agent: <span id="agentName">—</span></span>
    </div>
    <h2 style="text-align:center;">MISSION: DEFEND</h2>

    <!-- Loading state (quiz generation) -->
    <div id="loadingView" style="text-align:center;">
      <div class="radarLoader">
        <div class="radarSweep"></div>
        <div id="blipLayer"></div>
      </div>
      <div id="loadingStatus" class="loadingStatusText">Loading ammo crates...</div>
    </div>

    <!-- Error state -->
    <div id="errorView">
      <p id="errorMessage">Couldn't prep the mission.</p>
      <div style="text-align:center;">
        <button class="btnGhost" id="retryBtn">Try again</button>
      </div>
    </div>

    <!-- Game state -->
    <div id="gameView">
      <div class="gameHud">
        <div class="livesRow" id="livesRow"></div>
        <div class="hudScore">Score: <span id="scoreVal">0</span></div>
      </div>
      <div class="questionCounter" id="questionCounter">Question 1 / 8</div>
      <div class="questionText" id="questionText"></div>

      <div class="arena" id="arena">
        <div class="ufoField" id="ufoField"></div>
        <div id="laserLayer"></div>
      </div>

      <div class="rocketDock">
        <img class="spriteRocket" id="playerRocket" alt="">
      </div>

      <div class="feedbackBanner" id="feedbackBanner"></div>
    </div>

    <!-- Game over state -->
    <div id="gameOverView">
      <h2 id="gameOverTitle">MISSION COMPLETE</h2>
      <p id="gameOverScore">Score: 0</p>
      <button class="btnPrimary ready" id="toResultsBtn">SEE RESULTS &gt;</button>
    </div>

    <p class="creditFooter">Made by Computer System Operation &middot; Sarawak Skills Sri Aman</p>

  </div>
</div>

<script src="assets/pixelart.js"></script>
<script src="assets/starfield.js"></script>
<script src="assets/ai.js"></script>
<script>
// ---------- Read handoff data ----------
const username = sessionStorage.getItem('si_username');
const noteRaw = sessionStorage.getItem('si_note');
const learnDataRaw = sessionStorage.getItem('si_learnData');

if(!username || !noteRaw || !learnDataRaw){
  window.location.href = 'index.html';
}

const note = noteRaw ? JSON.parse(noteRaw) : null;
const learnData = learnDataRaw ? JSON.parse(learnDataRaw) : null;
document.getElementById('agentName').textContent = username || '—';

// ---------- Elements ----------
const loadingView = document.getElementById('loadingView');
const errorView = document.getElementById('errorView');
const gameView = document.getElementById('gameView');
const gameOverView = document.getElementById('gameOverView');
const loadingStatus = document.getElementById('loadingStatus');
const blipLayer = document.getElementById('blipLayer');
const livesRow = document.getElementById('livesRow');
const scoreVal = document.getElementById('scoreVal');
const questionCounter = document.getElementById('questionCounter');
const questionText = document.getElementById('questionText');
const ufoField = document.getElementById('ufoField');
const arena = document.getElementById('arena');
const laserLayer = document.getElementById('laserLayer');
const playerRocket = document.getElementById('playerRocket');
const feedbackBanner = document.getElementById('feedbackBanner');

// ---------- Loading flourishes ----------
const statusMessages = [
  'Loading ammo crates...',
  'Painting decoy UFOs...',
  'Calibrating the targeting laser...',
  'Recruiting good UFOs for defense...',
  'Sharpening quiz questions...',
  'Testing the ejector seat (kidding)...',
  'Fueling up the rocket...',
  'Scrambling the alien decoys...'
];
for(let i = statusMessages.length - 1; i > 0; i--){
  const j = Math.floor(Math.random() * (i + 1));
  [statusMessages[i], statusMessages[j]] = [statusMessages[j], statusMessages[i]];
}
let statusIdx = 0;
let statusInterval = null;
let blipInterval = null;

function startLoadingFlourishes(){
  loadingStatus.textContent = statusMessages[0];
  statusIdx = 0;
  statusInterval = setInterval(() => {
    statusIdx = (statusIdx + 1) % statusMessages.length;
    loadingStatus.textContent = statusMessages[statusIdx];
  }, 1700);
  blipInterval = setInterval(() => {
    const blip = document.createElement('div');
    blip.className = 'radarBlip';
    blip.style.left = (20 + Math.random() * 60) + '%';
    blip.style.top = (20 + Math.random() * 60) + '%';
    blipLayer.appendChild(blip);
    setTimeout(() => blip.remove(), 1600);
  }, 500);
}
function stopLoadingFlourishes(){
  clearInterval(statusInterval);
  clearInterval(blipInterval);
}

// ---------- Quiz generation ----------
const QUESTION_COUNT = 8;

function buildQuizPrompt(){
  const subtopics = learnData.keywords.map(k => k.term);
  return `You are creating a multiple-choice quiz to test a student on their teacher's notes.
Based ONLY on the attached notes (do not invent facts not supported by them), create exactly ${QUESTION_COUNT} multiple-choice questions.

Each question must use exactly one subtopic tag chosen from this fixed list (use the exact spelling given): ${JSON.stringify(subtopics)}

Respond with ONLY raw JSON (no markdown code fences, no commentary) — a JSON array shaped exactly like this:
[
  {
    "question": "the question text",
    "options": ["option A", "option B", "option C", "option D"],
    "correctIndex": 0,
    "subtopic": "one of the exact subtopic strings from the list above"
  }
]
Make exactly one option correct per question (correctIndex is its 0-based position). Keep questions clear, options plausible but unambiguous, and language appropriate for a student.`;
}

function validateQuiz(raw){
  if(!Array.isArray(raw)) return [];
  return raw.filter(q =>
    q && typeof q.question === 'string' &&
    Array.isArray(q.options) && q.options.length === 4 &&
    Number.isInteger(q.correctIndex) && q.correctIndex >= 0 && q.correctIndex <= 3 &&
    typeof q.subtopic === 'string'
  );
}

let quiz = [];

async function generateQuiz(){
  const raw = await askAI(buildQuizPrompt(), note);
  const cleaned = validateQuiz(raw);
  if(cleaned.length === 0) throw new Error('No valid questions came back — try again.');
  return cleaned;
}

// ---------- Game state ----------
let currentIndex = 0;
let score = 0;
let lives = 3;
let resultsLog = [];
let answering = false;

const CORRECT_LINES = ["Yay! Thank you, Agent!", "Nailed it!", "The good UFOs cheer!", "Correct — Earth is safe a little longer!"];
const WRONG_LINES = ["Ha! Wrong! Time to invade Earth!", "Oof, that one got away.", "The bad UFO cackles...", "Not quite, Agent."];

function pickRandom(arr){ return arr[Math.floor(Math.random() * arr.length)]; }

function renderLives(){
  livesRow.innerHTML = '';
  for(let i = 0; i < 3; i++){
    const img = document.createElement('img');
    img.className = 'lifeIcon spriteUfoGood';
    img.alt = '';
    img.src = pixelSprite(SPRITES.ufo.grid, SPRITES.ufo.goodPalette, 3);
    livesRow.appendChild(img);
  }
}

function showFeedback(text, kind){
  feedbackBanner.textContent = text;
  feedbackBanner.className = 'feedbackBanner show ' + kind;
}
function hideFeedback(){
  feedbackBanner.className = 'feedbackBanner';
}

function fireLaser(targetEl){
  const arenaRect = arena.getBoundingClientRect();
  const rocketRect = playerRocket.getBoundingClientRect();
  const targetRect = targetEl.getBoundingClientRect();

  const x1 = rocketRect.left + rocketRect.width / 2 - arenaRect.left;
  const y1 = rocketRect.top - arenaRect.top + arenaRect.height + 30; // rocket sits below arena
  const x2 = targetRect.left + targetRect.width / 2 - arenaRect.left;
  const y2 = targetRect.top + targetRect.height / 2 - arenaRect.top;

  const dx = x2 - x1, dy = y2 - y1;
  const dist = Math.sqrt(dx * dx + dy * dy);
  const angle = Math.atan2(dy, dx) * 180 / Math.PI;

  const laser = document.createElement('div');
  laser.className = 'laserBeam';
  laser.style.left = x1 + 'px';
  laser.style.top = y1 + 'px';
  laser.style.width = dist + 'px';
  laser.style.transform = `rotate(${angle}deg)`;
  laserLayer.appendChild(laser);
  setTimeout(() => laser.remove(), 300);
}

function renderQuestion(){
  if(currentIndex >= quiz.length){ finishGame(true); return; }
  const q = quiz[currentIndex];
  questionCounter.textContent = `Question ${currentIndex + 1} / ${quiz.length}`;
  questionText.textContent = q.question;
  hideFeedback();

  ufoField.innerHTML = '';
  q.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'ufoOption';
    const img = document.createElement('img');
    img.src = pixelSprite(SPRITES.ufo.grid, SPRITES.ufo.neutralPalette, 4);
    img.alt = '';
    const span = document.createElement('span');
    span.textContent = opt;
    btn.appendChild(img);
    btn.appendChild(span);
    btn.addEventListener('click', () => handleAnswer(i, btn));
    ufoField.appendChild(btn);
  });

  answering = false;
}

function handleAnswer(selectedIndex, btnEl){
  if(answering) return;
  answering = true;
  Array.from(ufoField.children).forEach(el => el.disabled = true);

  const q = quiz[currentIndex];
  const correct = selectedIndex === q.correctIndex;
  fireLaser(btnEl);

  setTimeout(() => {
    if(correct){
      score += 10;
      scoreVal.textContent = score;
      btnEl.classList.add('correctFlash');
      showFeedback(pickRandom(CORRECT_LINES), 'good');
      resultsLog.push({ subtopic: q.subtopic, correct: true });
    } else {
      lives--;
      renderLivesLoss();
      btnEl.classList.add('wrongFlash');
      const correctBtn = ufoField.children[q.correctIndex];
      if(correctBtn) correctBtn.classList.add('correctFlash');
      showFeedback(`${pickRandom(WRONG_LINES)} The right answer was: "${q.options[q.correctIndex]}"`, 'bad');
      resultsLog.push({ subtopic: q.subtopic, correct: false });
    }

    const delay = correct ? 1300 : 2400;
    setTimeout(() => {
      currentIndex++;
      if(lives <= 0){ finishGame(false); }
      else { renderQuestion(); }
    }, delay);
  }, 350);
}

function renderLivesLoss(){
  const icons = livesRow.querySelectorAll('.lifeIcon');
  const el = icons[lives]; // lives already decremented — this is the rightmost remaining
  if(el){
    el.classList.add('lifeLost');
    setTimeout(() => el.remove(), 400);
  }
}

function finishGame(completed){
  gameView.style.display = 'none';
  const correctCount = resultsLog.filter(r => r.correct).length;
  sessionStorage.setItem('si_quizResults', JSON.stringify({
    score,
    total: quiz.length,
    correctCount,
    log: resultsLog,
    completed
  }));
  gameOverView.style.display = 'block';
  document.getElementById('gameOverTitle').textContent = completed ? 'MISSION COMPLETE' : 'MISSION FAILED';
  document.getElementById('gameOverScore').textContent =
    `Score: ${score} — ${correctCount}/${quiz.length} correct`;
}

document.getElementById('toResultsBtn').addEventListener('click', () => {
  window.location.href = 'results.html';
});

// Keyboard support: number keys 1-4 select the matching UFO option.
document.addEventListener('keydown', (e) => {
  if(gameView.style.display !== 'block' || answering) return;
  const num = parseInt(e.key, 10);
  if(num >= 1 && num <= 4){
    const btn = ufoField.children[num - 1];
    if(btn) btn.click();
  }
});

// ---------- Boot ----------
async function startMission(){
  loadingView.style.display = 'block';
  errorView.style.display = 'none';
  gameView.style.display = 'none';
  gameOverView.style.display = 'none';
  startLoadingFlourishes();

  try{
    quiz = await generateQuiz();
    stopLoadingFlourishes();
    loadingView.style.display = 'none';
    gameView.style.display = 'block';
    score = 0;
    lives = 3;
    currentIndex = 0;
    resultsLog = [];
    scoreVal.textContent = '0';
    renderLives();
    renderQuestion();
  } catch(err){
    console.error(err);
    stopLoadingFlourishes();
    loadingView.style.display = 'none';
    errorView.style.display = 'block';
    document.getElementById('errorMessage').textContent = "Mission prep failed: " + err.message;
  }
}

document.getElementById('retryBtn').addEventListener('click', startMission);

if(note && learnData) startMission();
</script>

</body>
</html>
