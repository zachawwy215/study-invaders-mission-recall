<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mission: Defend — Study Invaders</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/style.css">
<link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
<link rel="alternate icon" href="assets/favicon.ico">
<script src="https://js.puter.com/v2/"></script>
<style>
  #loadingView, #errorView, #gameView, #gameOverView{ display:none; }
  #errorView p{ font-size:18px; color:var(--ink-dim); margin-bottom:20px; text-align:center; }

  /* ---------- HUD ---------- */
  .gameHud{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom:10px;
    font-size:17px;
  }
  .hudScore{ color:var(--amber); }
  .livesRow{ display:flex; gap:6px; }
  .lifeIcon{ width:26px; height:auto; transition:opacity 0.3s, transform 0.3s; }
  .lifeIcon.lifeLost{ opacity:0; transform:scale(0.3) rotate(20deg); }

  .questionCounter{
    text-align:center;
    font-size:15px;
    color:var(--ink-dim);
    letter-spacing:1px;
    margin-bottom:6px;
  }
  .questionText{
    text-align:center;
    font-size:21px;
    line-height:1.4;
    color:var(--ink);
    min-height:58px;
    margin-bottom:10px;
    padding:0 4px;
  }
  .controlHint{
    text-align:center;
    font-size:14px;
    color:var(--ink-dim);
    opacity:0.75;
    margin-bottom:10px;
    letter-spacing:0.5px;
  }

  /* ---------- Game canvas ---------- */
  .arena{
    position:relative;
    width:100%;
    height:380px;
    border:2px solid var(--panel-edge);
    border-radius:10px;
    overflow:hidden;
    background:rgba(10,11,30,0.35);
    cursor:crosshair;
    touch-action:none;
  }
  #gameCanvas{
    position:absolute;
    inset:0;
    display:block;
  }
  #ufoLabels{
    position:absolute;
    inset:0;
    pointer-events:none;
  }
  .ufoLabel{
    position:absolute;
    width:120px;
    margin-left:-60px;
    text-align:center;
    font-size:14px;
    line-height:1.2;
    color:var(--ink);
    text-shadow:0 1px 3px rgba(0,0,0,0.8);
    transition:opacity 0.2s;
  }

  .feedbackBanner{
    text-align:center;
    font-size:17px;
    min-height:26px;
    margin-top:14px;
    padding:0 8px;
    color:var(--amber);
    opacity:0;
    transition:opacity 0.2s;
  }
  .feedbackBanner.show{ opacity:1; }
  .feedbackBanner.good{ color:var(--cyan); }
  .feedbackBanner.bad{ color:var(--red); }

  /* ---------- Game over ---------- */
  #gameOverView{ text-align:center; padding:20px 0; }
  #gameOverView h2{ margin-bottom:14px; }
  #gameOverView p{ font-size:19px; color:var(--ink-dim); margin-bottom:24px; }
</style>
</head>
<body>

<canvas id="starfield"></canvas>
<div id="crt"></div>

<div class="stage">
  <div class="cabinet wide">

    <div class="topBar">
      <button class="btnGhost" id="backBtn">&larr; Menu</button>
      <span class="agentTag">Agent: <span id="agentName">—</span></span>
    </div>
    <h2 style="text-align:center;">MISSION: DEFEND</h2>

    <!-- Loading state (quiz generation) -->
    <div id="loadingView" style="text-align:center;">
      <div class="radarLoader">
        <div class="radarSweep"></div>
        <div id="blipLayer"></div>
      </div>
      <div id="loadingStatus" class="loadingStatusText">Loading ammo crates...</div>
    </div>

    <!-- Error state -->
    <div id="errorView">
      <p id="errorMessage">Couldn't prep the mission.</p>
      <div style="text-align:center;">
        <button class="btnGhost" id="retryBtn">Try again</button>
      </div>
    </div>

    <!-- Game state -->
    <div id="gameView">
      <div class="gameHud">
        <div class="livesRow" id="livesRow"></div>
        <div class="hudScore">Score: <span id="scoreVal">0</span></div>
      </div>
      <div class="questionCounter" id="questionCounter">Question 1 / 8</div>
      <div class="questionText" id="questionText"></div>
      <div class="controlHint">Move: A/D or mouse &middot; Shoot: Space or click</div>

      <div class="arena" id="arena">
        <canvas id="gameCanvas"></canvas>
        <div id="ufoLabels"></div>
      </div>

      <div class="feedbackBanner" id="feedbackBanner"></div>
    </div>

    <!-- Game over state -->
    <div id="gameOverView">
      <h2 id="gameOverTitle">MISSION COMPLETE</h2>
      <p id="gameOverScore">Score: 0</p>
      <button class="btnPrimary ready" id="toResultsBtn">SEE RESULTS &gt;</button>
    </div>

    <p class="creditFooter">Made by Computer System Operation &middot; Sarawak Skills Sri Aman</p>

  </div>
</div>

<script src="assets/pixelart.js"></script>
<script src="assets/starfield.js"></script>
<script src="assets/ai.js"></script>
<script>
// ---------- Read handoff data ----------
const username = sessionStorage.getItem('si_username');
const noteRaw = sessionStorage.getItem('si_note');
const learnDataRaw = sessionStorage.getItem('si_learnData');

if(!username || !noteRaw || !learnDataRaw){
  window.location.href = 'index.html';
}

const note = noteRaw ? JSON.parse(noteRaw) : null;
const learnData = learnDataRaw ? JSON.parse(learnDataRaw) : null;
document.getElementById('agentName').textContent = username || '—';

// ---------- Elements ----------
const loadingView = document.getElementById('loadingView');
const errorView = document.getElementById('errorView');
const gameView = document.getElementById('gameView');
const gameOverView = document.getElementById('gameOverView');
const loadingStatus = document.getElementById('loadingStatus');
const blipLayer = document.getElementById('blipLayer');
const livesRow = document.getElementById('livesRow');
const scoreVal = document.getElementById('scoreVal');
const questionCounter = document.getElementById('questionCounter');
const questionText = document.getElementById('questionText');
const arena = document.getElementById('arena');
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const ufoLabels = document.getElementById('ufoLabels');
const feedbackBanner = document.getElementById('feedbackBanner');

// ---------- Loading flourishes ----------
const statusMessages = [
  'Loading ammo crates...',
  'Painting decoy UFOs...',
  'Calibrating the targeting laser...',
  'Recruiting good UFOs for defense...',
  'Sharpening quiz questions...',
  'Testing the ejector seat (kidding)...',
  'Fueling up the rocket...',
  'Scrambling the alien decoys...'
];
for(let i = statusMessages.length - 1; i > 0; i--){
  const j = Math.floor(Math.random() * (i + 1));
  [statusMessages[i], statusMessages[j]] = [statusMessages[j], statusMessages[i]];
}
let statusIdx = 0;
let statusInterval = null;
let blipInterval = null;

function startLoadingFlourishes(){
  loadingStatus.textContent = statusMessages[0];
  statusIdx = 0;
  statusInterval = setInterval(() => {
    statusIdx = (statusIdx + 1) % statusMessages.length;
    loadingStatus.textContent = statusMessages[statusIdx];
  }, 1700);
  blipInterval = setInterval(() => {
    const blip = document.createElement('div');
    blip.className = 'radarBlip';
    blip.style.left = (20 + Math.random() * 60) + '%';
    blip.style.top = (20 + Math.random() * 60) + '%';
    blipLayer.appendChild(blip);
    setTimeout(() => blip.remove(), 1600);
  }, 500);
}
function stopLoadingFlourishes(){
  clearInterval(statusInterval);
  clearInterval(blipInterval);
}

// ---------- Quiz generation ----------
const QUESTION_COUNT = 8;

function buildQuizPrompt(){
  const subtopics = learnData.keywords.map(k => k.term);
  return `You are creating a multiple-choice quiz to test a student on their teacher's notes.
Based ONLY on the attached notes (do not invent facts not supported by them), create exactly ${QUESTION_COUNT} multiple-choice questions.

Each question must use exactly one subtopic tag chosen from this fixed list (use the exact spelling given): ${JSON.stringify(subtopics)}

Respond with ONLY raw JSON (no markdown code fences, no commentary) — a JSON array shaped exactly like this:
[
  {
    "question": "the question text",
    "options": ["option A", "option B", "option C", "option D"],
    "correctIndex": 0,
    "subtopic": "one of the exact subtopic strings from the list above"
  }
]
Make exactly one option correct per question (correctIndex is its 0-based position). Keep questions clear, options plausible but unambiguous, and language appropriate for a student. Keep each option short — under 6 words — since they'll be displayed on small UFOs.`;
}

function validateQuiz(raw){
  if(!Array.isArray(raw)) return [];
  return raw.filter(q =>
    q && typeof q.question === 'string' &&
    Array.isArray(q.options) && q.options.length === 4 &&
    Number.isInteger(q.correctIndex) && q.correctIndex >= 0 && q.correctIndex <= 3 &&
    typeof q.subtopic === 'string'
  );
}

let quiz = [];

async function generateQuiz(){
  const raw = await askAI(buildQuizPrompt(), note);
  const cleaned = validateQuiz(raw);
  if(cleaned.length === 0) throw new Error('No valid questions came back — try again.');
  return cleaned;
}

// ---------- Game state ----------
let currentIndex = 0;
let score = 0;
let lives = 3;
let resultsLog = [];
let resolved = false;   // true while a hit is being resolved (feedback showing, no new hits/fire)
let gameActive = false; // true only while the canvas loop should run

const CORRECT_LINES = ["Yay! Thank you, Agent!", "Nailed it!", "The good UFOs cheer!", "Correct — Earth is safe a little longer!"];
const WRONG_LINES = ["Ha! Wrong! Time to invade Earth!", "Oof, that one got away.", "The bad UFO cackles...", "Not quite, Agent."];

function pickRandom(arr){ return arr[Math.floor(Math.random() * arr.length)]; }

function renderLives(){
  livesRow.innerHTML = '';
  for(let i = 0; i < 3; i++){
    if(spritesAvailable){
      const img = document.createElement('img');
      img.className = 'lifeIcon spriteUfoGood';
      img.alt = '';
      img.src = pixelSprite(SPRITES.ufo.grid, SPRITES.ufo.goodPalette, 3);
      livesRow.appendChild(img);
    } else {
      const dot = document.createElement('div');
      dot.className = 'lifeIcon';
      dot.style.cssText = 'width:20px;height:20px;border-radius:50%;background:var(--cyan);display:inline-block;';
      livesRow.appendChild(dot);
    }
  }
}
function renderLivesLoss(){
  const icons = livesRow.querySelectorAll('.lifeIcon');
  const el = icons[lives]; // lives already decremented — this is the rightmost remaining
  if(el){
    el.classList.add('lifeLost');
    setTimeout(() => el.remove(), 400);
  }
}

function showFeedback(text, kind){
  feedbackBanner.textContent = text;
  feedbackBanner.className = 'feedbackBanner show ' + kind;
}
function hideFeedback(){
  feedbackBanner.className = 'feedbackBanner';
}

// ==========================================================
//  CANVAS SHOOTER ENGINE
// ==========================================================
let CW = 0, CH = 0;

function resizeCanvas(){
  const rect = arena.getBoundingClientRect();
  CW = Math.max(280, Math.floor(rect.width));
  CH = Math.floor(rect.height);
  canvas.width = CW;
  canvas.height = CH;
  canvas.style.width = CW + 'px';
  canvas.style.height = CH + 'px';
  if(ship) ship.y = CH - 34;
  regenerateGameStars();
}
window.addEventListener('resize', () => { if(gameActive) resizeCanvas(); });

// ---- Background starfield (matches the site's look, drawn into this canvas) ----
let gameStars = [];
function regenerateGameStars(){
  const count = Math.floor((CW * CH) / 3200);
  gameStars = Array.from({ length: count }, () => ({
    x: Math.random() * CW,
    y: Math.random() * CH,
    r: Math.random() * 1.3 + 0.3,
    speed: Math.random() * 18 + 6,
    twinklePhase: Math.random() * Math.PI * 2
  }));
}

// ---- Ship ----
let ship = { x: 0, y: 0, w: 30, h: 42, speed: 300 };

function resetShip(){
  ship.x = CW / 2;
  ship.y = CH - 34;
}

// ---- Input ----
const keys = { left: false, right: false };
let mouseX = null;
let lastMouseMoveTime = 0;
const MOUSE_IDLE_TIMEOUT = 150; // ms — mouse control only applies if recently moved

function onKeyDown(e){
  if(!gameActive) return;
  if(e.key === 'a' || e.key === 'A' || e.key === 'ArrowLeft') keys.left = true;
  if(e.key === 'd' || e.key === 'D' || e.key === 'ArrowRight') keys.right = true;
  if(e.code === 'Space'){ e.preventDefault(); tryFire(); }
}
function onKeyUp(e){
  if(e.key === 'a' || e.key === 'A' || e.key === 'ArrowLeft') keys.left = false;
  if(e.key === 'd' || e.key === 'D' || e.key === 'ArrowRight') keys.right = false;
}
document.addEventListener('keydown', onKeyDown);
document.addEventListener('keyup', onKeyUp);

window.addEventListener('mousemove', (e) => {
  if(!gameActive) return;
  const rect = canvas.getBoundingClientRect();
  mouseX = e.clientX - rect.left;
  lastMouseMoveTime = performance.now();
});
canvas.addEventListener('click', () => tryFire());
canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  mouseX = e.touches[0].clientX - rect.left;
  lastMouseMoveTime = performance.now();
  tryFire();
}, { passive: false });
canvas.addEventListener('touchmove', (e) => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  mouseX = e.touches[0].clientX - rect.left;
  lastMouseMoveTime = performance.now();
}, { passive: false });

// ---- Projectiles ----
let projectiles = [];
const PROJECTILE_SPEED = 460; // px/sec
const FIRE_COOLDOWN = 280;    // ms
let lastFire = 0;

function tryFire(){
  if(!gameActive || resolved) return;
  const now = performance.now();
  if(now - lastFire < FIRE_COOLDOWN) return;
  lastFire = now;
  projectiles.push({ x: ship.x, y: ship.y - ship.h / 2 });
}

// ---- UFOs ----
let ufos = [];
let driftAmplitude = 34;

function spawnUfos(q){
  ufos = [];
  ufoLabels.innerHTML = '';

  const narrow = CW < 480;
  const cols = narrow ? 2 : 4;
  const rows = narrow ? 2 : 1;
  const margin = Math.max(24, Math.min(55, CW * 0.08));
  const usableW = Math.max(80, CW - margin * 2);
  const colSpacing = usableW / cols;
  const labelWidth = Math.max(40, Math.min(130, colSpacing - 8));
  const labelFontSize = colSpacing < 90 ? 11 : (colSpacing < 130 ? 13 : 14);
  driftAmplitude = Math.max(10, Math.min(34, colSpacing * 0.22));

  const rowSpacing = 84;
  const topY = narrow ? 50 : 66;

  for(let i = 0; i < 4; i++){
    const col = i % cols;
    const row = Math.floor(i / cols);
    const homeX = margin + (usableW * (col + 0.5)) / cols;
    const homeY = topY + row * rowSpacing;
    const ufo = {
      homeX, x: homeX, homeY, y: homeY - CH - 60, phase: Math.random() * Math.PI * 2,
      option: q.options[i], isCorrect: i === q.correctIndex,
      subtopic: q.subtopic, alive: true, resultState: null, // null | 'correct' | 'wrong'
      state: 'entering' // 'entering' | 'active' | 'exiting'
    };
    const label = document.createElement('div');
    label.className = 'ufoLabel';
    label.textContent = q.options[i];
    label.style.width = labelWidth + 'px';
    label.style.marginLeft = (-labelWidth / 2) + 'px';
    label.style.fontSize = labelFontSize + 'px';
    ufoLabels.appendChild(label);
    ufo.labelEl = label;
    ufos.push(ufo);
  }
}

function drawPixelGrid(grid, palette, cx, cy, pxSize){
  const rows = grid.length, cols = grid[0].length;
  const w = cols * pxSize, h = rows * pxSize;
  const startX = cx - w / 2, startY = cy - h / 2;
  for(let y = 0; y < rows; y++){
    for(let x = 0; x < cols; x++){
      const ch = grid[y][x];
      if(ch === '.') continue;
      ctx.fillStyle = palette[ch];
      ctx.fillRect(startX + x * pxSize, startY + y * pxSize, pxSize, pxSize);
    }
  }
}

// If assets/pixelart.js fails to load, or is an older version missing a
// palette/grid this page needs, don't let a partial object cause a crash
// mid-render. Verify every specific piece we depend on up front.
const spritesAvailable = (
  typeof SPRITES !== 'undefined' &&
  typeof pixelSprite === 'function' &&
  SPRITES.rocket && SPRITES.rocket.grid && SPRITES.rocket.palette &&
  SPRITES.ufo && SPRITES.ufo.grid &&
  SPRITES.ufo.goodPalette && SPRITES.ufo.badPalette && SPRITES.ufo.neutralPalette
);
if(!spritesAvailable){
  console.warn('Study Invaders: assets/pixelart.js is missing or out of date — using fallback shapes. Try re-uploading the latest assets/pixelart.js.');
}

function drawShip(cx, cy){
  if(spritesAvailable){
    drawPixelGrid(SPRITES.rocket.grid, SPRITES.rocket.palette, cx, cy, 4);
    return;
  }
  ctx.fillStyle = '#c9d6ff';
  ctx.beginPath();
  ctx.moveTo(cx, cy - 20);
  ctx.lineTo(cx - 14, cy + 18);
  ctx.lineTo(cx + 14, cy + 18);
  ctx.closePath();
  ctx.fill();
  ctx.fillStyle = '#ffd166';
  ctx.beginPath();
  ctx.moveTo(cx - 6, cy + 16);
  ctx.lineTo(cx + 6, cy + 16);
  ctx.lineTo(cx, cy + 26);
  ctx.closePath();
  ctx.fill();
}

function drawUfo(cx, cy, resultState){
  const colors = {
    neutral: '#9c93c2',
    correct: '#4ce0d2',
    wrong: '#ff5470'
  };
  if(spritesAvailable){
    let palette = SPRITES.ufo.neutralPalette;
    if(resultState === 'correct') palette = SPRITES.ufo.goodPalette;
    if(resultState === 'wrong') palette = SPRITES.ufo.badPalette;
    drawPixelGrid(SPRITES.ufo.grid, palette, cx, cy, 4);
    return;
  }
  ctx.fillStyle = colors[resultState || 'neutral'];
  ctx.beginPath();
  ctx.ellipse(cx, cy, 22, 10, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(cx, cy - 6, 10, 8, 0, 0, Math.PI * 2);
  ctx.fill();
}

function resolveHit(hitUfo){
  resolved = true;
  const q = quiz[currentIndex];
  const correct = hitUfo.isCorrect;

  hitUfo.resultState = correct ? 'correct' : 'wrong';
  if(!correct){
    const correctUfo = ufos.find(u => u.isCorrect);
    if(correctUfo) correctUfo.resultState = 'correct';
  }

  if(correct){
    score += 10;
    scoreVal.textContent = score;
    showFeedback(pickRandom(CORRECT_LINES), 'good');
    resultsLog.push({ subtopic: q.subtopic, correct: true });
  } else {
    lives--;
    renderLivesLoss();
    showFeedback(`${pickRandom(WRONG_LINES)} The right answer was: "${q.options[q.correctIndex]}"`, 'bad');
    resultsLog.push({ subtopic: q.subtopic, correct: false });
  }

  const delay = correct ? 1300 : 2400;
  setTimeout(() => {
    currentIndex++;
    beginExitSweep(() => {
      if(lives <= 0){ endMission(false); }
      else if(currentIndex >= quiz.length){ endMission(true); }
      else { startNextQuestion(); }
    });
  }, delay);
}

// Sends all current UFOs flying downward past the ship and off-screen,
// then calls onComplete once they're fully gone.
const EXIT_SPEED = 480; // px/sec
let exitCompleteCallback = null;

function beginExitSweep(onComplete){
  hideFeedback();
  if(ufos.length === 0){ onComplete(); return; }
  ufos.forEach(u => { u.state = 'exiting'; });
  exitCompleteCallback = onComplete;
}

function startNextQuestion(){
  const q = quiz[currentIndex];
  questionCounter.textContent = `Question ${currentIndex + 1} / ${quiz.length}`;
  questionText.textContent = q.question;
  projectiles = [];
  resolved = false;
  spawnUfos(q); // new UFOs start off-screen above and animate down into place
}

// ---- Loop ----
let lastTime = 0;
function loop(now){
  if(!gameActive) return;
  const dt = Math.min(0.05, (now - lastTime) / 1000 || 0);
  lastTime = now;
  try{
    update(dt, now);
    render();
  } catch(err){
    console.error('Study Invaders render error:', err);
    gameActive = false;
    showFeedback('⚠️ Something went wrong drawing the game. Screenshot this and send it to your developer: ' + err.message, 'bad');
    return; // stop the loop so we don't spam errors every frame
  }
  requestAnimationFrame(loop);
}

function update(dt, now){
  // Ship movement — WASD/arrows always take priority. Mouse only applies if
  // it has moved recently (within MOUSE_IDLE_TIMEOUT); a mouse that's just
  // resting somewhere shouldn't fight against keyboard-only play.
  if(keys.left) ship.x -= ship.speed * dt;
  if(keys.right) ship.x += ship.speed * dt;
  const mouseRecentlyActive = mouseX !== null && (now - lastMouseMoveTime) < MOUSE_IDLE_TIMEOUT;
  if(!keys.left && !keys.right && mouseRecentlyActive){
    ship.x += (mouseX - ship.x) * Math.min(1, dt * 8);
  }
  ship.x = Math.max(ship.w / 2 + 4, Math.min(CW - ship.w / 2 - 4, ship.x));

  // UFO motion depends on state:
  // - entering: dropping straight down from off-screen into its resting spot
  // - active: normal side-to-side hover drift (frozen once resolved, for readability)
  // - exiting: swept straight down, past the ship, off the bottom of the screen
  const ENTER_SPEED = 340; // px/sec
  const t = now / 1000;
  ufos.forEach(u => {
    if(u.state === 'entering'){
      u.y += ENTER_SPEED * dt;
      if(u.y >= u.homeY){ u.y = u.homeY; u.state = 'active'; }
    } else if(u.state === 'exiting'){
      u.y += EXIT_SPEED * dt;
    } else if(u.state === 'active' && !resolved){
      u.x = u.homeX + Math.sin(t * 0.8 + u.phase) * driftAmplitude;
    }
  });
  ufos.forEach(u => {
    u.labelEl.style.left = u.x + 'px';
    u.labelEl.style.top = (u.y + 22) + 'px';
    u.labelEl.style.opacity = (u.y < -20 || u.y > CH + 20) ? '0' : '1';
  });

  // Once every exiting UFO has fully cleared the bottom of the screen, let
  // the caller know so it can spawn the next wave (or end the mission).
  if(exitCompleteCallback && ufos.length > 0 && ufos.every(u => u.state !== 'exiting' || u.y > CH + 40)){
    const cb = exitCompleteCallback;
    exitCompleteCallback = null;
    cb();
  }

  // Background stars drift slowly downward
  gameStars.forEach(s => {
    s.y += s.speed * dt;
    if(s.y > CH){ s.y = 0; s.x = Math.random() * CW; }
  });

  // Projectiles
  projectiles.forEach(p => p.y -= PROJECTILE_SPEED * dt);
  projectiles = projectiles.filter(p => p.y > -20);

  // Collisions
  if(!resolved){
    outer:
    for(const p of projectiles){
      for(const u of ufos){
        if(!u.alive || u.state !== 'active') continue;
        if(Math.abs(p.x - u.x) < 26 && Math.abs(p.y - u.y) < 20){
          p.y = -9999;
          resolveHit(u);
          break outer;
        }
      }
    }
    projectiles = projectiles.filter(p => p.y > -999);
  }
}

function render(){
  ctx.clearRect(0, 0, CW, CH);

  // Starfield background
  gameStars.forEach(s => {
    const twinkle = Math.sin(performance.now() / 500 + s.twinklePhase) * 0.35 + 0.65;
    ctx.globalAlpha = twinkle;
    ctx.fillStyle = '#e9e6f7';
    ctx.fillRect(s.x, s.y, s.r, s.r);
  });
  ctx.globalAlpha = 1;

  // Projectiles
  projectiles.forEach(p => {
    ctx.fillStyle = '#4ce0d2';
    ctx.shadowColor = '#4ce0d2';
    ctx.shadowBlur = 8;
    ctx.fillRect(p.x - 2, p.y - 8, 4, 12);
    ctx.shadowBlur = 0;
  });

  // UFOs
  ufos.forEach(u => {
    if(u.resultState){
      ctx.beginPath();
      ctx.fillStyle = u.resultState === 'correct' ? 'rgba(76,224,210,0.25)' : 'rgba(255,84,112,0.25)';
      ctx.arc(u.x, u.y, 30, 0, Math.PI * 2);
      ctx.fill();
    }
    drawUfo(u.x, u.y, u.resultState);
  });

  // Ship
  drawShip(ship.x, ship.y);
}

function endMission(completed){
  gameActive = false;
  gameView.style.display = 'none';
  const correctCount = resultsLog.filter(r => r.correct).length;
  sessionStorage.setItem('si_quizResults', JSON.stringify({
    score,
    total: quiz.length,
    correctCount,
    log: resultsLog,
    completed
  }));
  gameOverView.style.display = 'block';
  document.getElementById('gameOverTitle').textContent = completed ? 'MISSION COMPLETE' : 'MISSION FAILED';
  document.getElementById('gameOverScore').textContent =
    `Score: ${score} — ${correctCount}/${quiz.length} correct`;
}

document.getElementById('backBtn').addEventListener('click', () => {
  if(gameActive){
    if(confirm('Leave this mission? Your progress on this playthrough will be lost.')){
      window.location.href = 'index.html';
    }
  } else {
    window.location.href = 'index.html';
  }
});

document.getElementById('toResultsBtn').addEventListener('click', () => {
  window.location.href = 'results.html';
});

// ---------- Boot ----------
async function startMission(){
  loadingView.style.display = 'block';
  errorView.style.display = 'none';
  gameView.style.display = 'none';
  gameOverView.style.display = 'none';
  startLoadingFlourishes();

  try{
    quiz = await generateQuiz();
    stopLoadingFlourishes();
    loadingView.style.display = 'none';
    gameView.style.display = 'block';

    score = 0;
    lives = 3;
    currentIndex = 0;
    resultsLog = [];
    resolved = false;
    projectiles = [];
    scoreVal.textContent = '0';
    renderLives();

    resizeCanvas();
    resetShip();

    const q = quiz[currentIndex];
    questionCounter.textContent = `Question 1 / ${quiz.length}`;
    questionText.textContent = q.question;
    spawnUfos(q);

    gameActive = true;
    lastTime = performance.now();
    requestAnimationFrame(loop);
  } catch(err){
    console.error(err);
    stopLoadingFlourishes();
    loadingView.style.display = 'none';
    errorView.style.display = 'block';
    document.getElementById('errorMessage').textContent =
      "Mission prep failed: " + err.message + " — If this mentions a low balance, try signing out of Puter and signing back in with a different account.";
  }
}

document.getElementById('retryBtn').addEventListener('click', startMission);

if(note && learnData) startMission();
</script>
