<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mission Briefing — Study Invaders</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/style.css">
<style>
  .fileTag{
    font-size:16px;
    color:var(--ink-dim);
    margin:0 0 26px;
  }
  .summaryText{
    font-size:19px;
    line-height:1.5;
    color:var(--ink);
    margin:0;
  }
  .highlightList{
    list-style:none;
    margin:0;
    padding:0;
  }
  .highlightList li{
    font-size:18px;
    line-height:1.5;
    padding-left:22px;
    position:relative;
    margin-bottom:8px;
  }
  .highlightList li::before{
    content:"★";
    position:absolute;
    left:0;
    color:var(--cyan);
    font-size:14px;
    top:2px;
  }
  .keywordWrap{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
  }
  .keywordChip{
    background:var(--panel);
    border:2px solid var(--cyan);
    color:var(--cyan);
    font-family:'VT323', monospace;
    font-size:17px;
    padding:6px 14px;
    border-radius:20px;
    cursor:pointer;
    transition:background 0.15s, color 0.15s;
  }
  .keywordChip:hover{ background:var(--cyan); color:var(--void); }
  .keywordDef{
    display:none;
    font-size:17px;
    color:var(--ink-dim);
    margin-top:10px;
    padding:10px 12px;
    border-left:2px solid var(--cyan);
    background:rgba(76,224,210,0.06);
  }
  .keywordDef.open{ display:block; }
  .bottomRow{
    display:flex;
    gap:12px;
    margin-top:8px;
  }
</style>
</head>
<body>

<canvas id="starfield"></canvas>
<div id="crt"></div>

<div class="stage">
  <div class="cabinet wide">

    <div class="topBar">
      <button class="btnGhost" onclick="window.location.href='index.html'">&larr; Back</button>
      <span class="agentTag">Agent: <span id="agentName">—</span></span>
    </div>

    <h2>MISSION BRIEFING</h2>
    <p class="fileTag" id="fileTag"></p>

    <div id="resultView">
      <div class="card">
        <p class="cardTitle">SUMMARY</p>
        <p class="summaryText" id="summaryText"></p>
      </div>

      <div class="card">
        <p class="cardTitle">HIGHLIGHTS</p>
        <ul class="highlightList" id="highlightList"></ul>
      </div>

      <div class="card">
        <p class="cardTitle">KEYWORDS</p>
        <div class="keywordWrap" id="keywordWrap"></div>
      </div>

      <div class="bottomRow">
        <button class="btnPrimary ready" id="launchBtn">LAUNCH MISSION &gt;</button>
      </div>
    </div>

  </div>
</div>

<script src="assets/pixelart.js"></script>
<script src="assets/starfield.js"></script>
<script>
// This page only ever displays data that index.html already fetched from
// Gemini. If that data isn't present, there's nothing to show — send the
// student back to start a mission properly.
const username = sessionStorage.getItem('si_username');
const noteRaw = sessionStorage.getItem('si_note');
const learnDataRaw = sessionStorage.getItem('si_learnData');

if(!username || !noteRaw || !learnDataRaw){
  window.location.href = 'index.html';
}

const note = noteRaw ? JSON.parse(noteRaw) : null;
const learnData = learnDataRaw ? JSON.parse(learnDataRaw) : null;

document.getElementById('agentName').textContent = username || '—';
if(note) document.getElementById('fileTag').textContent = `Source: ${note.name}`;

if(learnData){
  document.getElementById('summaryText').textContent = learnData.summary;

  const list = document.getElementById('highlightList');
  learnData.highlights.forEach(h => {
    const li = document.createElement('li');
    li.textContent = h;
    list.appendChild(li);
  });

  const wrap = document.getElementById('keywordWrap');
  const holder = document.createElement('div');
  holder.id = 'keywordDefsHolder';

  learnData.keywords.forEach((kw, i) => {
    const chip = document.createElement('button');
    chip.className = 'keywordChip';
    chip.type = 'button';
    chip.textContent = kw.term;

    const def = document.createElement('div');
    def.className = 'keywordDef';
    def.id = `kwdef-${i}`;
    def.textContent = kw.definition;

    chip.addEventListener('click', () => def.classList.toggle('open'));

    wrap.appendChild(chip);
    holder.appendChild(def);
  });

  wrap.after(holder);
}

document.getElementById('launchBtn').addEventListener('click', () => {
  window.location.href = 'play.html';
});
</script>

</body>
</html>
