<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Study Invaders: Mission Recall</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/style.css">
<style>
  #rocketIcon{
    width:44px;
    height:auto;
    animation:bob 2.4s ease-in-out infinite;
    filter:drop-shadow(0 0 6px rgba(76,224,210,0.5));
  }
  @keyframes bob{
    0%,100%{ transform:translateY(0) rotate(-2deg); }
    50%{ transform:translateY(-6px) rotate(2deg); }
  }
  .ufoRow{
    display:flex;
    justify-content:center;
    gap:28px;
    margin:6px 0 28px;
  }
  .ufoRow img{ width:46px; animation:drift 3.6s ease-in-out infinite; }
  .ufoRow img:nth-child(2){ animation-delay:0.6s; }
  .ufoRow img:nth-child(3){ animation-delay:1.2s; }
  @keyframes drift{
    0%,100%{ transform:translateY(0); }
    50%{ transform:translateY(-8px); }
  }
</style>
</head>
<body>

<canvas id="starfield"></canvas>
<div id="crt"></div>

<div class="stage">
  <div class="cabinet">

    <div class="titleRow">
      <img id="rocketIcon" class="spriteRocket" alt="">
      <h1>STUDY<br>INVADERS</h1>
    </div>
    <p class="missionTag">MISSION: RECALL</p>
    <p class="tagline">Defend your grade. Shoot the right answer.</p>

    <div class="ufoRow">
      <img class="spriteUfoGood" alt="">
      <img class="spriteUfoBad" alt="">
      <img class="spriteUfoGood" alt="">
    </div>

    <fieldset>
      <label for="username">Callsign (your name)</label>
      <input type="text" id="username" placeholder="e.g. Alex Tan" autocomplete="off">
    </fieldset>

    <fieldset>
      <label>Mission notes</label>
      <div class="uploadZone" id="uploadZone">
        <input type="file" id="noteUpload" accept=".pdf,.txt,.png,.jpg,.jpeg">
        <div class="zoneLabel" id="zoneLabel">Tap to upload your teacher's notes</div>
        <div class="zoneHint">PDF, image, or text file</div>
      </div>
    </fieldset>

    <button id="playBtn" class="btnPrimary">PLAY</button>
    <div id="status"></div>

  </div>
</div>

<script src="assets/pixelart.js"></script>
<script src="assets/starfield.js"></script>
<script>
const usernameInput = document.getElementById('username');
const uploadInput = document.getElementById('noteUpload');
const uploadZone = document.getElementById('uploadZone');
const zoneLabel = document.getElementById('zoneLabel');
const playBtn = document.getElementById('playBtn');
const status = document.getElementById('status');

let uploadedFile = null;

function checkReady(){
  const ready = usernameInput.value.trim().length > 0 && uploadedFile !== null;
  playBtn.classList.toggle('ready', ready);
}

usernameInput.addEventListener('input', checkReady);

uploadInput.addEventListener('change', () => {
  if(uploadInput.files.length > 0){
    uploadedFile = uploadInput.files[0];
    zoneLabel.textContent = uploadedFile.name;
    uploadZone.classList.add('hasFile');
  } else {
    uploadedFile = null;
    zoneLabel.textContent = "Tap to upload your teacher's notes";
    uploadZone.classList.remove('hasFile');
  }
  checkReady();
});

// Convert the uploaded file into a plain-object payload that can be
// serialized into sessionStorage (File objects themselves can't be stored).
async function fileToPayload(file){
  const looksLikeText = file.type.startsWith('text/') || /\.(txt|md)$/i.test(file.name);
  if(looksLikeText){
    const text = await file.text();
    return { name: file.name, mimeType: file.type || 'text/plain', isText: true, content: text };
  }
  const dataUrl = await new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
  const base64 = dataUrl.split(',')[1];
  return { name: file.name, mimeType: file.type || 'application/octet-stream', isText: false, content: base64 };
}

playBtn.addEventListener('click', async () => {
  if(!playBtn.classList.contains('ready')) return;
  status.textContent = 'Uploading transmission...';
  try{
    const payload = await fileToPayload(uploadedFile);
    sessionStorage.setItem('si_username', usernameInput.value.trim());
    sessionStorage.setItem('si_note', JSON.stringify(payload));
    // Clear any stale learn data from a previous note before heading to Learn.
    sessionStorage.removeItem('si_learnData');
    window.location.href = 'learn.html';
  } catch(err){
    console.error(err);
    status.textContent = "Couldn't read that file — try a different one.";
  }
});
</script>

</body>
</html>
